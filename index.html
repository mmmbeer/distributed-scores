<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Keep Score</title>
  <link rel="icon" type="image/png" href="/keepscore.png">
  <link rel="apple-touch-icon" href="/keepscore.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="landing-mode">
  <main class="scorekeeper" id="scoreboard" hidden>
    <button id="homeButton" class="chrome-button top-left" type="button" aria-label="Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5v8a1 1 0 0 1-1 1h-5.5v-6h-5v6H4a1 1 0 0 1-1-1v-8Z"/></svg>
    </button>
    <button id="shareGame" class="chrome-button top-right scorekeeper-only" type="button" aria-label="Share viewer link">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 16.1c-.76 0-1.44.3-1.96.77L8.91 12.7a3.3 3.3 0 0 0 0-1.39l7.05-4.12A3 3 0 1 0 15 5c0 .23.03.45.08.66L8.03 9.78a3 3 0 1 0 0 4.44l7.12 4.18c-.04.19-.06.39-.06.6a3 3 0 1 0 3-2.9Z"/></svg>
    </button>

    <section id="leftSide" class="side left">
      <header class="team-header">
        <input id="leftTeam" class="team-input scorekeeper-only" autocomplete="off" aria-label="Team name">
        <div id="leftTeamLabel" class="viewer-name embedded-viewer-name">Home</div>
      </header>
      <div id="leftScore" class="score">0</div>
      <footer id="leftGamesBar" class="games game-tracker" aria-label="Team games won">Games: <span id="leftGames">0</span>/<span id="leftGamesTotal">0</span></footer>
    </section>
    <section id="rightSide" class="side right">
      <header class="team-header">
        <input id="rightTeam" class="team-input scorekeeper-only" autocomplete="off" aria-label="Opponent name">
        <div id="rightTeamLabel" class="viewer-name embedded-viewer-name">Opponent</div>
      </header>
      <div id="rightScore" class="score">0</div>
      <footer id="rightGamesBar" class="games game-tracker" aria-label="Opponent games won">Games: <span id="rightGames">0</span>/<span id="rightGamesTotal">0</span></footer>
    </section>

    <div id="syncStatus" class="sync-status">Live sync</div>
    <nav class="controls scorekeeper-only" aria-label="Scorekeeper controls">
      <button id="newSet" class="text-button" type="button">New Match</button>
      <button id="swapSides" class="icon-button" type="button" aria-label="Swap team sides">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10.6l-3.3-3.3L16 2l6.2 6.2L16 14.4l-1.7-1.7 3.3-3.3H7V7Zm10 10H6.4l3.3 3.3L8 22l-6.2-6.2L8 9.6l1.7 1.7-3.3 3.3H17V17Z"/></svg>
      </button>
      <button id="resetMatch" class="text-button danger-button" type="button">Reset Score</button>
    </nav>
  </main>

  <div id="homeModal" class="modal-backdrop hidden">
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="homeTitle">
      <img class="modal-logo" src="/keepscore.png" alt="Keep Score logo">
      <h1 id="homeTitle">Keep Score</h1>
      <p>Start a live game as the scorekeeper or join with a share key.</p>
      <div class="mode-actions">
        <button id="chooseScorekeeper" class="mode-primary" type="button">Scorekeeper</button>
        <button id="chooseViewer" type="button">Viewer</button>
      </div>
    </section>
  </div>

  <div id="setupModal" class="modal-backdrop hidden">
    <form id="setupForm" class="modal-card" role="dialog" aria-modal="true" aria-labelledby="setupTitle">
      <div class="modal-heading">
        <h1 id="setupTitle">New Game</h1>
        <button id="continueExistingGame" class="link-button" type="button">Continue existing</button>
      </div>
      <div class="field-row">
        <label>Team Name<input id="setupTeam" required maxlength="80" value="Home"></label>
        <label class="color-field">Color<input id="setupTeamColor" type="hidden" value="#991408"><button class="color-picker-button" type="button" data-color-picker="setupTeamColor" style="--selected-color: #991408" aria-label="Choose team color"></button></label>
      </div>
      <div class="field-row">
        <label>Opponent<input id="setupOpponent" maxlength="80" placeholder="Opponent"></label>
        <label class="color-field">Color<input id="setupOpponentColor" type="hidden" value="#3a0ca3"><button class="color-picker-button" type="button" data-color-picker="setupOpponentColor" style="--selected-color: #3a0ca3" aria-label="Choose opponent color"></button></label>
      </div>
      <div id="colorPickerPanel" class="color-picker-panel hidden" aria-label="Team color presets">
        <button type="button" data-color-preset="#991408" style="--preset-color: #991408" aria-label="Select red"></button>
        <button type="button" data-color-preset="#3a0ca3" style="--preset-color: #3a0ca3" aria-label="Select purple"></button>
        <button type="button" data-color-preset="#0b5ed7" style="--preset-color: #0b5ed7" aria-label="Select blue"></button>
        <button type="button" data-color-preset="#198754" style="--preset-color: #198754" aria-label="Select green"></button>
        <button type="button" data-color-preset="#fd7e14" style="--preset-color: #fd7e14" aria-label="Select orange"></button>
        <button type="button" data-color-preset="#6f42c1" style="--preset-color: #6f42c1" aria-label="Select violet"></button>
        <button type="button" data-color-preset="#111827" style="--preset-color: #111827" aria-label="Select black"></button>
        <button type="button" data-color-preset="#f7d046" style="--preset-color: #f7d046" aria-label="Select gold"></button>
      </div>
      <div class="modal-actions"><button type="button" data-close>Back</button><button class="mode-primary" type="submit">Create Game</button></div>
    </form>
  </div>

  <div id="continueModal" class="modal-backdrop hidden">
    <form id="continueForm" class="modal-card" role="dialog" aria-modal="true" aria-labelledby="continueTitle">
      <h1 id="continueTitle">Continue an existing game</h1>
      <label>Game ID<input id="continueKey" required maxlength="5" minlength="5" autocomplete="off" placeholder="XXXXX"></label>
      <div class="modal-actions"><button type="button" data-close>Back</button><button class="mode-primary" type="submit">Scorekeep</button></div>
    </form>
  </div>

  <div id="joinModal" class="modal-backdrop hidden">
    <form id="joinForm" class="modal-card" role="dialog" aria-modal="true" aria-labelledby="joinTitle">
      <h1 id="joinTitle">Join Game</h1>
      <label>Share Key<input id="joinKey" required maxlength="5" minlength="5" autocomplete="off" placeholder="XXXXX"></label>
      <div class="modal-actions"><button type="button" data-close>Back</button><button class="mode-primary" type="submit">Watch</button></div>
    </form>
  </div>


  <div id="tutorialOverlay" class="tutorial-overlay hidden" aria-live="polite">
    <div class="tutorial-scrim"></div>
    <div id="tutorialSpotlight" class="tutorial-spotlight" aria-hidden="true"></div>
    <section id="tutorialPopover" class="tutorial-popover" role="dialog" aria-modal="true" aria-labelledby="tutorialTitle" aria-describedby="tutorialText">
      <div class="tutorial-meta"><span id="tutorialStepCount">1 of 4</span></div>
      <div id="tutorialGesture" class="tutorial-gesture up" aria-hidden="true"><span></span></div>
      <h1 id="tutorialTitle">Add points</h1>
      <p id="tutorialText">Tap or swipe up on either team side to add a point.</p>
      <div class="tutorial-actions">
        <button id="tutorialSkip" type="button">Skip</button>
        <button id="tutorialNext" class="mode-primary" type="button">Next</button>
      </div>
    </section>
  </div>

  <div id="confirmModal" class="modal-backdrop hidden">
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
      <h1 id="confirmTitle">Confirm Action</h1>
      <p id="confirmMessage"></p>
      <div class="modal-actions">
        <button id="confirmCancel" type="button">Cancel</button>
        <button id="confirmAccept" class="mode-primary" type="button">Confirm</button>
      </div>
    </section>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
